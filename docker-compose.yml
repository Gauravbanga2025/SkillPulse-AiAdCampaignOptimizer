services:
  # 1. Local Isolated AI Orchestration Engine
  ollama:
    image: ollama/ollama:latest
    container_name: adoptimizer-ai
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # 2. Express Backend API
  api:
    image: gauravbanga/adoptimizer-backend:latest # 🔑 Updated: Swapped build block for Docker Hub registry path
    container_name: adoptimizer-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_URL=http://ollama:11434
      - HOST=0.0.0.0
      - PORT=8080
    depends_on:
      - ollama
    restart: unless-stopped
    volumes:
      - ./api/dev.db:/app/dev.db # 💾 Kept: Persistent SQLite link to your host machine

  # 3. Next.js Frontend User Interface
  web:
    image: gauravbanga/adoptimizer-frontend:latest # 🔑 Updated: Swapped build block for Docker Hub registry path
    container_name: adoptimizer-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://172.105.36.248:8080
      - API_URL=http://api:8080
      - BACKEND_URL=http://api:8080
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
