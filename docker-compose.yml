services:
  # 1. Local Isolated AI Orchestration Engine
  ollama:
    image: ollama/ollama:latest
    container_name: adoptimizer-ai
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # 2. Express Backend API
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: adoptimizer-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  # 3. Next.js Frontend User Interface
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: adoptimizer-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
