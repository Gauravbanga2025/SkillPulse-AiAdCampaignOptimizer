name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, master]

jobs:
  security-scan:
    name: 🛡️ Code Quality & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_GIT_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=SkillPulse-AiAdCampaignOptimizer
            -Dsonar.sources=api/src,web/src
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**

      - name: Show Sonar Report
        run: |
          echo "==============================="
          echo "Sonar report-task.txt"
          echo "==============================="
          cat .scannerwork/report-task.txt

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Wait for SonarQube Background Task
        continue-on-error: true
        run: |
          TASK_URL=$(grep ceTaskUrl .scannerwork/report-task.txt | cut -d= -f2-)

          echo "Task URL:"
          echo "$TASK_URL"

          for i in {1..30}
          do
            RESPONSE=$(curl -s -u "${{ secrets.SONAR_GIT_TOKEN }}:" "$TASK_URL")

            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')

            echo "Current Status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "SonarQube analysis completed"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "=================================="
              echo "SonarQube Failure Details"
              echo "=================================="

              echo "$RESPONSE"

              ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId')
              ERROR_MSG=$(echo "$RESPONSE" | jq -r '.task.errorMessage')

              echo "Analysis ID: $ANALYSIS_ID"
              echo "Error Message: $ERROR_MSG"

              exit 1
            fi

            sleep 10
          done

      - name: Check SonarQube Quality Gate
        continue-on-error: true
        run: |
          PROJECT_KEY="SkillPulse-AiAdCampaignOptimizer"

          RESPONSE=$(curl -s -u "${{ secrets.SONAR_GIT_TOKEN }}:" \
          "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=$PROJECT_KEY")

          echo "Quality Gate Response:"
          echo "$RESPONSE"

          GATE_STATUS=$(echo "$RESPONSE" | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $GATE_STATUS"

          if [ "$GATE_STATUS" != "OK" ]; then
            echo "Quality Gate Failed"
            exit 1
          fi

          echo "Quality Gate Passed"

  build-and-push:
    name: 📦 Secure Docker Containerization
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Express API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/adoptimizer-backend:latest

      - name: Build and Push Next.js UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/adoptimizer-frontend:latest

  deploy:
    name: 🚀 Automated Secure Production Deploy
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Deployment Rules
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_SERVER_IP }}
          username: root
          key: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          script: |
            cd /home/devops/SkillPulse-AiAdCampaignOptimizer

            git pull origin main

            terraform init

            terraform import kubernetes_deployment.backend default/adoptimizer-backend || true
            terraform import kubernetes_deployment.frontend default/adoptimizer-frontend || true
            terraform import kubernetes_deployment.ai_engine default/adoptimizer-ai || true
            terraform import kubernetes_horizontal_pod_autoscaler.backend_autoscaler default/backend-autoscaler || true

            terraform apply -auto-approve

            kubectl rollout restart deployment/adoptimizer-frontend
            kubectl rollout restart deployment/adoptimizer-backend
