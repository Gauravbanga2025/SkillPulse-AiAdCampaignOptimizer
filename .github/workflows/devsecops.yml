name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  security-scan:
    name: 🛡️ Code Quality & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_GIT_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=SkillPulse-AiAdCampaignOptimizer
            -Dsonar.sources=api/src,web/src
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**

      # Debug Sonar output
      - name: Debug Sonar Report
        run: |
          echo "SONAR_HOST_URL=${{ secrets.SONAR_HOST_URL }}"
          echo "================================="
          echo "Contents of report-task.txt"
          echo "================================="
          
          if [ -f .scannerwork/report-task.txt ]; then
            cat .scannerwork/report-task.txt
          else
            echo "ERROR: report-task.txt not found!"
            exit 1
          fi

      - name: Enforce SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 10
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_GIT_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    name: 📦 Secure Docker Containerization
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Express API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/adoptimizer-backend:latest

      - name: Build and Push Next.js UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/adoptimizer-frontend:latest

  deploy:
    name: 🚀 Automated Secure Production Deploy
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Deployment Rules
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_SERVER_IP }}
          username: root
          key: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          script: |
            cd /home/devops/SkillPulse-AiAdCampaignOptimizer

            # Pull latest source code
            git pull origin main

            # Initialize Terraform
            terraform init

            # Import existing resources if not already imported
            terraform import kubernetes_deployment.backend default/adoptimizer-backend || true
            terraform import kubernetes_deployment.frontend default/adoptimizer-frontend || true
            terraform import kubernetes_deployment.ai_engine default/adoptimizer-ai || true
            terraform import kubernetes_horizontal_pod_autoscaler.backend_autoscaler default/backend-autoscaler || true

            # Apply infrastructure updates
            terraform apply -auto-approve

            # Rolling restart
            kubectl rollout restart deployment/adoptimizer-frontend
            kubectl rollout restart deployment/adoptimizer-backend
