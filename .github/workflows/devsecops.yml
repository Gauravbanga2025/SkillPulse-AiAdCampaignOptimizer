name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  security-scan:
    name: 🛡️ Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan Pass
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=SkillPulse-AiAdCampaignOptimizer
            -Dsonar.sources=api/src,web/src
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**

      - name: Enforce SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    name: 📦 Secure Docker Containerization
    needs: security-scan # Prevents building if SonarQube flags security issues!
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Express API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/adoptimizer-backend:latest

      - name: Build and Push Next.js UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/adoptimizer-frontend:latest

  deploy:  # 🔑 Added exactly 2 spaces here to align with build-and-push!
    name: 🚀 Automated Secure Production Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Deployment Rules
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_SERVER_IP }}
          username: root
          key: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          script: |
            cd /home/devops/SkillPulse-AiAdCampaignOptimizer

            # 1. Pull down the latest GitHub modifications
            git pull origin main

            # 2. Re-initialize the plugin cache binaries
            terraform init

            # 3. Dynamic Import Sequence (Forces Terraform to map existing resources into the pipeline state)
            terraform import kubernetes_deployment.backend default/adoptimizer-backend || true
            terraform import kubernetes_deployment.frontend default/adoptimizer-frontend || true
            terraform import kubernetes_deployment.ai_engine default/adoptimizer-ai || true
            terraform import kubernetes_horizontal_pod_autoscaler.backend_autoscaler default/backend-autoscaler || true

            # 4. Apply the synchronized infrastructure mappings seamlessly
            terraform apply -auto-approve

            # 5. Execute zero-downtime rolling cluster hot-swaps
            kubectl rollout restart deployment/adoptimizer-frontend
            kubectl rollout restart deployment/adoptimizer-backend
