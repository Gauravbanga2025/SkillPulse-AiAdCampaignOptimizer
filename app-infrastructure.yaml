# ==========================================
# app-infrastructure.yaml — FULLY FIXED
# ==========================================

# ==========================================
# 0. PERSISTENT VOLUME CLAIM FOR SQLITE DB
# 🔑 FIX: Added — was missing, causing empty DB on pod start
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlite-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ==========================================
# 1. OLLAMA AI ENGINE (DEPLOYMENT & SERVICE)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-ai
  labels:
    app: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  selector:
    app: ai
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434

---
# ==========================================
# 2. EXPRESS BACKEND API (DEPLOYMENT & SERVICE)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: api
        image: gauravbanga/adoptimizer-backend:latest
        command: ["node", "dist/index.js"]
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: OLLAMA_HOST
          value: "http://ollama:11434"
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        # 🔑 FIX: Mount persistent SQLite database
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/dev.db
          subPath: dev.db
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
      # 🔑 FIX: Attach the PVC to the pod
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---
# ==========================================
# 3. NEXT.JS FRONTEND (DEPLOYMENT & SERVICE)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web
        image: gauravbanga/adoptimizer-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://172.105.36.248:8080"
        - name: API_URL
          value: "http://api:8080"
        - name: BACKEND_URL
          value: "http://api:8080"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: NodePort

---
# ==========================================
# 4. HORIZONTAL POD AUTOSCALER
# 🔑 FIX: maxReplicas was 2 (same as min), making HPA useless
# ==========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adoptimizer-backend
  minReplicas: 2
  maxReplicas: 6  # 🔑 FIX: Was 2 — now HPA can actually scale up
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
