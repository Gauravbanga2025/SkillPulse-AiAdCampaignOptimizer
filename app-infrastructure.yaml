# ==========================================================================
# app-infrastructure.yaml — PRODUCTION GRADED MESH (SECURE VAULT STORAGE)
# ==========================================================================

# ==========================================
# 0. PERSISTENT VOLUME CLAIM FOR SQLITE DB
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlite-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ==========================================
# 1. EXPRESS BACKEND API (DEPLOYMENT & SERVICE)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-backend
  labels:
    app: backend
spec:
  replicas: 1  # 🔑 FIX: Kept at 1 pod to prevent multi-process SQLite lock contentions
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: api
        image: gauravbanga/adoptimizer-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        # 🔑 FIX: Securely mount the Google API token from your decoupled infrastructure secrets map
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: adoptimizer-secrets
              key: GEMINI_API_KEY
        - name: DATABASE_URL
          value: "file:/app/data/production.db"
        - name: NODE_ENV
          value: "production"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/data
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---
# ==========================================
# 2. NEXT.JS FRONTEND (DEPLOYMENT & SERVICE)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web
        image: gauravbanga/adoptimizer-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://172.105.36.248:8080"
        - name: API_URL
          value: "http://api:8080"
        - name: BACKEND_URL
          value: "http://api:8080"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: NodePort

---
# ==========================================
# 3. HORIZONTAL POD AUTOSCALER
# ==========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adoptimizer-backend
  minReplicas: 1  
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
