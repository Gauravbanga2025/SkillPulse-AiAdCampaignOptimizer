# ==========================================
# 1. OLLAMA AI ENGINE (DEPLOYMENT & SERVICE)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-ai
  labels:
    app: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  selector:
    app: ai
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
---
# ==========================================
# 2. EXPRESS BACKEND API (DEPLOYMENT & SERVICE)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-backend
  labels:
    app: backend
spec:
  replicas: 2  # 🛡️ High Availability: Split across your KIND worker nodes!
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: api
        image: gauravbanga/adoptimizer-backend:latest
        command: ["node", "dist/index.js"] # 🔑 FIX: Bypasses nodemon and runs the compiled JS directly!
        ports:
        - containerPort: 8080
        env: # 🔑 Fixed: Changed from environment to env
        - name: NODE_ENV
          value: "production"
        - name: OLLAMA_HOST
          value: "http://ollama:11434"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        # 🔄 AUTOHEALING: Restarts automatically if the backend container freezes
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
# ==========================================
# 3. NEXT.JS FRONTEND (DEPLOYMENT & SERVICE)
# =================────────────────=========
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoptimizer-frontend
  labels:
    app: frontend
spec:
  replicas: 2  # 🛡️ High Availability: Ensures the UI stays up
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web
        image: gauravbanga/adoptimizer-frontend:latest
        ports:
        - containerPort: 3000
        env: # 🔑 Fixed: Changed from environment to env
        - name: NEXT_PUBLIC_API_URL
          value: "http://172.105.36.248:8080"
        - name: API_URL
          value: "http://api:8080"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: NodePort

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adoptimizer-backend # 🔑 Fixed: Corrected target name mapping to match deployment
  minReplicas: 2
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
