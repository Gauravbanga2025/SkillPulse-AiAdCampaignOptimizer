apiVersion: v1
kind: Service
metadata:
  name: api  # 🔑 CRITICAL: This exact string matches the frontend's http://api:8080 environment lookup!
  namespace: default
spec:
  selector:
    app: backend  # Routes traffic directly to your running adoptimizer-backend pods
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP  # Keeps the backend isolated inside the cluster network mesh
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  selector:
    app: frontend  # Routes traffic directly to your running adoptimizer-frontend pods
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
